    /* ---- Dark scrim so text + buttons stay legible over any photo ---- */
    .scrim{
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(90% 55% at 50% 46%, rgba(42,33,24,.30), transparent 70%),
        linear-gradient(180deg, rgba(42,33,24,.55) 0%, rgba(42,33,24,.34) 32%, rgba(42,33,24,.50) 64%, rgba(20,16,11,.80) 100%);
    }

    .wrap{
      max-width:430px; margin:0 auto;
      min-height:100dvh;
      display:flex; flex-direction:column; justify-content:center;
      gap:30px;
      padding:
        calc(38px + env(safe-area-inset-top)) 24px
        calc(28px + env(safe-area-inset-bottom));
    }

    /* ---- Hero ---- */
    .hero{text-align:center}
    .eyebrow{
      display:inline-flex; align-items:center; gap:8px;
      font-size:.72rem; letter-spacing:.22em; text-transform:uppercase;
      font-weight:600; color:var(--cream-dim);
      margin-bottom:14px;
    }
    .eyebrow svg{width:16px;height:16px;overflow:visible}
    .sprout-stem,.sprout-leaf{
      fill:none; stroke:var(--leaf-bright); stroke-width:1.6;
      stroke-linecap:round; stroke-linejoin:round;
    }
    .wordmark{
      font-family:"Fraunces",serif; font-weight:600;
      font-size:clamp(3.4rem,18vw,4.6rem); line-height:.92;
      letter-spacing:-.02em;
      text-shadow:0 2px 24px rgba(20,15,8,.45);
    }
    .tagline{
      font-family:"Fraunces",serif; font-style:italic; font-weight:500;
      font-size:clamp(1.15rem,5vw,1.4rem); line-height:1.25;
      margin-top:16px; color:var(--cream);
    }
    .subline{
      font-size:.92rem; line-height:1.45; color:var(--cream-dim);
      margin-top:10px; max-width:30ch; margin-left:auto; margin-right:auto;
    }

    /* ---- Action buttons ---- */
    .actions{display:flex; flex-direction:column; gap:12px}
    .btn{
      display:flex; align-items:center; gap:14px;
      width:100%; min-height:62px; padding:0 18px;
      border-radius:16px; text-decoration:none;
      color:var(--cream); font-size:1.02rem; font-weight:600;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.20);
      -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
      box-shadow:0 6px 22px rgba(15,11,6,.28);
      transition:transform .18s ease, background .18s ease, border-color .18s ease;
    }
    .btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.17);
      border-color:rgba(255,255,255,.34);
    }
    .btn:active{transform:translateY(0)}
    .btn:focus-visible{outline:2px solid var(--leaf-bright); outline-offset:3px}
    .btn .ico{width:26px;height:26px;flex:0 0 26px;display:grid;place-items:center}
    .btn .ico svg{width:24px;height:24px}
    .btn .label{flex:1}
    .btn .chev{opacity:.55;width:18px;height:18px}
    /* brand-tinted icons on neutral glass */
    .ico--wa{color:var(--wa)} .ico--pya{color:var(--pya)}
    .ico--ig{color:var(--ig)} .ico--loc{color:var(--honey)}

    /* ---- Menu link ---- */
    .menu-link{text-align:center}
    .menu-link a{
      display:inline-flex; align-items:center; gap:9px;
      color:var(--cream); text-decoration:none; font-weight:500;
      font-size:1rem; padding:6px 4px;
      border-bottom:1px solid rgba(245,240,228,.4);
      transition:border-color .18s ease, gap .18s ease;
    }
    .menu-link a:hover{border-color:var(--cream); gap:13px}
    .menu-link svg{width:18px;height:18px}

    .foot{
      text-align:center; font-size:.82rem; color:var(--cream-dim);
      letter-spacing:.02em;
    }
    .foot .dot{opacity:.5; margin:0 7px}

    /* ---- Entrance animation ---- */
    @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .hero,.actions .btn,.menu-link,.foot{animation:rise .7s cubic-bezier(.2,.7,.3,1) both}
    .hero{animation-delay:.05s}
    .actions .btn:nth-child(1){animation-delay:.18s}
    .actions .btn:nth-child(2){animation-delay:.26s}
    .actions .btn:nth-child(3){animation-delay:.34s}
    .actions .btn:nth-child(4){animation-delay:.42s}
